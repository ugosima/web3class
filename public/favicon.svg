<svg
    viewBox="0 0 64 64"
    xmlns="http://www.w3.org/2000/svg"
>
    <!-- White background -->
    <rect width="64" height="64" rx="14" fill="#ffffff" />

    <!-- Main hexagon -->
    <path
        d="M32 8 51 19v22L32 52 13 41V19L32 8Z"
        fill="none"
        stroke="#075c3a"
        stroke-width="0.7"
        stroke-linejoin="round"
    />

    <!-- Inner circle -->
    <circle
        cx="32"
        cy="31"
        r="16"
        fill="none"
        stroke="#075c3a"
        stroke-width="0.7"
    />

    <!-- Graduation cap -->
    <path
        d="M21 27 32 21 43 27 32 33 21 27Z"
        fill="none"
        stroke="#075c3a"
        stroke-width="0.7"
        stroke-linejoin="round"
    />

    <!-- Cap base -->
    <path
        d="M26 31v5.5c0 2.2 2.7 4 6 4s6-1.8 6-4V31"
        fill="none"
        stroke="#075c3a"
        stroke-width="0.7"
        stroke-linecap="round"
        stroke-linejoin="round"
        transform="translate(0 -1)"

    />

    <!-- Tassel -->
    <path
        d="M43 27v7"
        stroke="#075c3a"
        stroke-width="0.6"
        stroke-linecap="round"
        transform="translate(-0.2 -0.1)"

    />

    <circle
        cx="43"
        cy="35"
        r="1.2"
        fill="#075c3a"
        transform="translate(-0.2 -0.1)"


    />
</svg>